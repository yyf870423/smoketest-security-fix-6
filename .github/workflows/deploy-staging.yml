name: Deploy Staging

on:
  push:
    branches: [staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Phase 2（本地）：Dispatcher 本地执行部署，此 workflow 只发通知
    # Phase 3（阿里云）：此 workflow 推镜像 + SSH 远程部署
    steps:
      - name: Notify Feishu
        run: |
          TOKEN=$(curl -s -X POST https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"${{ secrets.FEISHU_APP_ID }}\",\"app_secret\":\"${{ secrets.FEISHU_APP_SECRET }}\"}" \
            | jq -r '.tenant_access_token')
          curl -s -X POST "https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=open_id" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"receive_id\":\"${{ secrets.FEISHU_NOTIFY_OPEN_ID }}\",\"msg_type\":\"text\",\"content\":\"{\\\"text\\\":\\\"📦 staging 分支更新，Dispatcher 正在部署 Staging 环境...\\\"}\"}"

